[tasks.install]
description = "Create venv and install dependencies"
run = """
python3 -m venv .venv
.venv/bin/pip install -q -r requirements.txt
"""

[tasks.server]
description = "Run yfinance MCP server"
run = ".venv/bin/python server.py"

[tasks.pip-check]
description = "Verify installed dependencies"
run = ".venv/bin/pip show mcp yfinance | grep Name"
